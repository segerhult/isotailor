version: '3.8'

# Basic web application stack example - modify services according to your needs
services:
  # Web server service
  web:
    image: nginx:alpine
    container_name: web-server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./static-files:/usr/share/nginx/html
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app-network

  # Application backend service
  app:
    build: ./app
    container_name: node-app
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://user:pass@db:5432/appdb
    volumes:
      - ./app:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - app-network

  # Database service
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=appdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - app-network

# Persistent volumes
volumes:
  postgres-data:

# Shared network
networks:
  app-network:
    driver: bridge
